<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AMZ Studios | Redirecionando...</title>
    <style>
        body { background-color: black; color: white; font-family: sans-serif; display: flex; justify-content: center; items-center; height: 100vh; margin: 0; }
        .loader { text-align: center; margin: auto; }
    </style>
</head>
<body>
    <div class="loader">
        <h2>Sincronizando com AMZ BOT...</h2>
        <p style="color: #666; font-size: 12px; uppercase; letter-spacing: 2px;">Aguarde um instante</p>
    </div>

    <script>
        // Captura os parâmetros da URL, não importa onde o GitHub se perdeu
        const buscaNaUrl = window.location.search || window.location.hash;
        const urlParams = new URLSearchParams(buscaNaUrl.replace('#/', '?').replace('#', '?'));
        const code = urlParams.get('code');

        if (code) {
            // Guarda o código temporariamente no sessionStorage para o index.html ler
            sessionStorage.setItem('discord_auth_code', code);
        }
        
        // Força a volta para a página inicial limpa sem quebrar a rota
        window.location.href = "https://muniz-amz.github.io/amz-studios.github.io/";
    </script>
</body>
</html>
